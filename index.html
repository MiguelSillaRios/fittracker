// FFMI: Fat-Free Mass Index
function calcFFMI(weightKg, bodyFatPct, heightCm) {
    if (!weightKg || !bodyFatPct || !heightCm) return null;
    const hm = heightCm / 100;
    const lbm = weightKg * (1 - bodyFatPct / 100);
    const ffmi = lbm / (hm * hm);
    const normalized = ffmi + 6.1 * (1.8 - hm);
    return { ffmi: Math.round(ffmi * 10) / 10, normalized: Math.round(normalized * 10) / 10, lbm: Math.round(lbm * 10) / 10 };
}

function ffmiRange(normalized, gender) {
    const isMale = gender !== 'female';
    const ranges = isMale ? [
        { max: 18,   label: 'Por debajo de la media', color: '#64748b' },
        { max: 20,   label: 'Media',                  color: '#3b82f6' },
        { max: 22,   label: 'Por encima de la media', color: '#10b981' },
        { max: 23,   label: 'Atlético',               color: '#22c55e' },
        { max: 25,   label: 'Muy atlético',           color: '#f59e0b' },
        { max: 26,   label: 'Élite natural',          color: '#f97316' },
        { max: 999,  label: 'Posiblemente asistido',  color: '#ef4444' },
    ] : [
        { max: 14,   label: 'Por debajo de la media', color: '#64748b' },
        { max: 16,   label: 'Media',                  color: '#3b82f6' },
        { max: 17,   label: 'Por encima de la media', color: '#10b981' },
        { max: 18,   label: 'Atlética',               color: '#22c55e' },
        { max: 19,   label: 'Muy atlética',           color: '#f59e0b' },
        { max: 21,   label: 'Élite natural',          color: '#f97316' },
        { max: 999,  label: 'Posiblemente asistida',  color: '#ef4444' },
    ];
    return ranges.find(r => normalized < r.max) || ranges[ranges.length - 1];
}

// FFMI gauge percent (0-100) for visual bar
function ffmiGaugePct(normalized, gender) {
    const min = gender === 'female' ? 12 : 15;
    const max = gender === 'female' ? 23 : 28;
    return Math.min(100, Math.max(0, ((normalized - min) / (max - min)) * 100));
}

    const genDate = new Date().toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' });

    const topEx = Object.entries(d.exStrength).filter(function(e){ return e[1].length >= 2; }).slice(0, 4);

    let exChartDivs = '';

    let sessHTML = '';

        }).join('');

    });

    let prsHTML = '';

    });

    const hasBW = d.bwData.length >= 2;
    const chartsJSON = JSON.stringify({ weekFreq:d.weekFreq, volData:d.volData, bwData:d.bwData, exStrength:d.exStrength });

    return '<!DOCTYPE html>\n' +
'<html lang="es">\n' +
'<head>\n' +
'<meta charset="UTF-8">\n' +
'<meta name="viewport" content="width=device-width,initial-scale=1.0">\n' +
'<title>Reporte de ' + name + ' \u2014 FitTracker Pro</title>\n' +
'<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><' + '/script>\n' +
'<style>\n' +
'*{box-sizing:border-box;margin:0;padding:0}\n' +

// ─── APP ──────────────────────────────────────────────────────────────────────

createApp({
setup() {

// ── State ──
const profiles    = ref(db.get('profiles', []));
const sessions    = ref(db.get('sessions', []));
const bodyWeights = ref(db.get('bw', []));
const exercises   = ref(db.get('exercises', null));

if (!exercises.value) {

    db.set('exercises', exercises.value);
}

const profileId  = ref(db.get('pid', null));
const view       = ref('home');
const session    = ref(null);   // active workout
const copiedDay  = ref(db.get('copiedDay', null)); // { date, exercises }

// Timer
const timer = ref({ on: false, elapsed: 0, target: 90, _id: null });

// Modals / UI
const modal = ref('');  // 'addExercise' | 'addProfile' | 'viewSession'
const search   = ref('');
const mgFilter = ref('');
const newProfileName   = ref('');
const newProfileColor  = ref(PROFILE_COLORS[0]);
const newProfileHeight = ref('');
const newProfileGender = ref('male');
const newExForm = ref({ name:'', muscleGroup:'pecho' });
const newBW     = ref('');
const newBF     = ref('');   // body fat %
const viewedSession = ref(null);

// Progress
const progTab = ref('strength');
const progExId = ref('');

// Charts refs
let charts = {};

// ── Computed ──

const profile = computed(() => profiles.value.find(p => p.id === profileId.value) || null);

const mySessions = computed(() =>
    sessions.value.filter(s => s.profileId === profileId.value).sort((a,b) => b.date.localeCompare(a.date))
);

const myBW = computed(() =>
    bodyWeights.value.filter(b => b.profileId === profileId.value).sort((a,b) => a.date.localeCompare(b.date))
);

const stats = computed(() => {
    const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
    const weekStr = weekAgo.toISOString().slice(0,10);
    return {
        total: mySessions.value.length,
        week:  mySessions.value.filter(s => s.date >= weekStr).length,
        bw:    myBW.value.length ? myBW.value[myBW.value.length-1].weight : null,
    };
});

const allPRs = computed(() => {
    const prs = {};
    mySessions.value.forEach(sess => {
        sess.exercises.forEach(ex => {
            ex.sets.forEach(set => {
                if (!set.weight || !set.reps) return;
                const orm = calc1RM(set.weight, set.reps);
                if (!prs[ex.exId] || orm > prs[ex.exId].orm) {
                    prs[ex.exId] = { name: ex.name, weight: set.weight, reps: set.reps, orm, date: sess.date };
                }
            });
        });
    });
    return prs;
});

const filteredExercises = computed(() => {
    let list = exercises.value;
    if (mgFilter.value) list = list.filter(e => e.muscleGroup === mgFilter.value);
    if (search.value) { const q = search.value.toLowerCase(); list = list.filter(e => e.name.toLowerCase().includes(q)); }
    return list;
});

const loggedExercises = computed(() => {
    const seen = new Set();
    mySessions.value.forEach(s => s.exercises.forEach(e => seen.add(e.exId)));
    return exercises.value.filter(e => seen.has(e.id));
});

const timerDisplay = computed(() => fmtTime(timer.value.target - timer.value.elapsed));
const timerProgress = computed(() => Math.min((timer.value.elapsed / timer.value.target) * 100, 100));
const timerOver = computed(() => timer.value.elapsed >= timer.value.target);

const currentFFMI = computed(() => {
    const bws = myBW.value;
    if (!bws.length) return null;
    // Get latest entry that has body fat recorded
    const latest = [...bws].reverse().find(b => b.bodyFat);
    if (!latest) return null;
    const p = profile.value;
    if (!p?.height) return null;
    const result = calcFFMI(latest.weight, latest.bodyFat, p.height);
    if (!result) return null;
    const range = ffmiRange(result.normalized, p.gender || 'male');
    const gaugePct = ffmiGaugePct(result.normalized, p.gender || 'male');
    return { ...result, range, gaugePct, date: latest.date, bodyFat: latest.bodyFat, weight: latest.weight };
});

// ── Actions ──

function save() {
    db.set('profiles', profiles.value);
    db.set('sessions', sessions.value);
    db.set('bw', bodyWeights.value);
    db.set('exercises', exercises.value);
}

}

        id: uid(),
        name: newProfileName.value.trim(),
        color: newProfileColor.value,
        gender: newProfileGender.value,

    };

    profiles.value   = profiles.value.filter(p => p.id !== id);

    save();
    if (profileId.value === id) { profileId.value = null; db.set('pid', null); }
}

function getLastData(exId) {
    for (const s of mySessions.value) {
        const ex = s.exercises.find(e => e.exId === exId);
        if (ex) return { date: s.date, sets: ex.sets.map(s => ({ weight: s.weight, reps: s.reps })) };
    }
    return null;
}

function startWorkout() {
    const d = today();
    const existing = mySessions.value.find(s => s.date === d);
    if (existing) {
        session.value = JSON.parse(JSON.stringify(existing));
    } else {
        session.value = { id: uid(), profileId: profileId.value, date: d, notes: '', exercises: [], startedAt: Date.now() };
    }
    view.value = 'workout';
}

function addExToSession(ex) {
    if (!session.value) return;
    if (session.value.exercises.find(e => e.exId === ex.id)) { modal.value = ''; return; }
    const last = getLastData(ex.id);
    const defSets = profile.value?.defaultSets || 3;
    const sets = last
        ? last.sets.map(s => ({ weight: s.weight, reps: s.reps, done: false }))
        : Array.from({ length: defSets }, () => ({ weight: 0, reps: 0, done: false }));
    session.value.exercises.push({ exId: ex.id, name: ex.name, mg: ex.muscleGroup, sets, lastData: last });
    modal.value = '';
    search.value = '';
    mgFilter.value = '';
}

function removeEx(i) { session.value.exercises.splice(i, 1); }
function addSet(i) {
    const sets = session.value.exercises[i].sets;
    const last = sets[sets.length-1];
    sets.push({ weight: last?.weight||0, reps: last?.reps||0, done: false });
}
function removeSet(i) {
    const sets = session.value.exercises[i].sets;
    if (sets.length > 1) sets.pop();
}

function toggleDone(exI, setI) {
    const set = session.value.exercises[exI].sets[setI];
    set.done = !set.done;
    if (set.done) startTimer();
}

function isPR(ex, set) {
    if (!set.done || !set.weight || !set.reps) return false;
    const orm = calc1RM(set.weight, set.reps);
    const pr = allPRs.value[ex.exId];
    return !pr || orm > pr.orm;
}

function finishWorkout() {
    if (!session.value) return;
    const idx = sessions.value.findIndex(s => s.id === session.value.id);
    if (idx >= 0) sessions.value[idx] = session.value;
    else sessions.value.push(session.value);
    save();
    stopTimer();
    session.value = null;
    view.value = 'home';
}

function cancelWorkout() { stopTimer(); session.value = null; view.value = 'home'; }

// Timer
function startTimer() {
    stopTimer();
    timer.value.elapsed = 0;
    timer.value.on = true;
    timer.value._id = setInterval(() => {
        timer.value.elapsed++;
        if (timer.value.elapsed === timer.value.target && navigator.vibrate) navigator.vibrate([200,100,200]);
    }, 1000);
}
function stopTimer() {
    if (timer.value._id) { clearInterval(timer.value._id); timer.value._id = null; }
    timer.value.on = false;
    timer.value.elapsed = 0;
}
function resetTimer() { timer.value.elapsed = 0; }

        weight: parseFloat(newBW.value),
        bodyFat: newBF.value ? parseFloat(newBF.value) : null,

function deleteSession(id) { if(confirm('¿Eliminar esta sesión?')) { sessions.value = sessions.value.filter(s => s.id !== id); save(); } }

function importData(e) {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
        try {
            const d = JSON.parse(ev.target.result);
            if (d.profiles)    profiles.value    = d.profiles;

function generateReport() {
    const p = profile.value;
    if (!p) return;
    const sesses = mySessions.value;
    if (!sesses.length) { alert('No hay sesiones registradas todavía.'); return; }

    const bw = myBW.value;
    const prs = allPRs.value;

    // Most-logged exercises
    const cnt = {};
    sesses.forEach(s => s.exercises.forEach(ex => { cnt[ex.exId] = (cnt[ex.exId]||0)+1; }));
    const topExIds = Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,6).map(e=>e[0]);

    const exNames = {};
    sesses.forEach(s => s.exercises.forEach(ex => { exNames[ex.exId] = ex.name; }));

    const exStrength = {};
    topExIds.forEach(id => { exStrength[id] = getExData(id); });

    // Volume per session (chronological)
    const volData = sesses.slice().reverse().map(s => ({ date: s.date, vol: sessVolume(s) }));

    // Weekly frequency last 12 weeks
    const weekFreq = [];
    const now = new Date();
    for (let i = 11; i >= 0; i--) {
        const ws = new Date(now); ws.setDate(now.getDate() - i*7);
        const we = new Date(ws); we.setDate(ws.getDate()+6);
        const a = ws.toISOString().slice(0,10), b = we.toISOString().slice(0,10);
        weekFreq.push({ label: ws.toLocaleDateString('es-ES',{day:'numeric',month:'short'}), count: sesses.filter(s=>s.date>=a&&s.date<=b).length });
    }

    // Stats
    const sorted = [...sesses].reverse();
    const firstDate = sorted[0]?.date;
    const lastDate = sorted[sorted.length-1]?.date;
    const totalVol = sesses.reduce((t,s)=>t+sessVolume(s),0);
    const bwFirst = bw[0]?.weight, bwLast = bw[bw.length-1]?.weight;
    const bwChange = bwFirst && bwLast ? Math.round((bwLast-bwFirst)*10)/10 : null;
    let weekAvg = null;
    if (firstDate && lastDate && sesses.length >= 3) {
        const days = (new Date(lastDate)-new Date(firstDate))/(1000*60*60*24);
        if (days >= 7) weekAvg = (sesses.length/(days/7)).toFixed(1);
    }
    const fmtD = d => new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
    const period = firstDate === lastDate ? fmtD(firstDate) : fmtD(firstDate)+' \u2013 '+fmtD(lastDate);

    const data = {
        profile: p,
        sessions: sesses,
        bwData: bw,
        prs,
        exStrength,
        exNames,
        weekFreq,
        volData,
        stats: {
            totalSessions: sesses.length,
            totalVolStr: totalVol >= 1000000 ? (totalVol/1000000).toFixed(1)+'M' : totalVol >= 1000 ? (totalVol/1000).toFixed(1)+'k' : totalVol.toLocaleString(),
            prCount: Object.keys(prs).length,
            weekAvg,
            bwChange,
            period
        }
    };

    const html = buildReportHTML(data);
    const blob = new Blob([html], { type: 'text/html; charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'reporte-' + p.name.replace(/\s+/g,'-').toLowerCase().replace(/[^a-z0-9-]/g,'') + '-' + today() + '.html';
    a.click();
}

function exportExcel() {
    const p = profile.value;
    if (!p) return;
    const sesses = mySessions.value;
    if (!sesses.length) { alert('No hay sesiones registradas todavía.'); return; }
    const bw = myBW.value;
    const prs = allPRs.value;

    const wb = XLSX.utils.book_new();

    // ── Hoja 1: Resumen ──────────────────────────────────────────
    const sorted = [...sesses].reverse();
    const firstDate = sorted[0]?.date;
    const lastDate = sorted[sorted.length-1]?.date;
    const totalVol = sesses.reduce((t,s) => t + sessVolume(s), 0);
    const bwLast = bw.length ? bw[bw.length-1].weight : null;
    const bwFirst = bw.length ? bw[0].weight : null;
    const summaryRows = [
        ['FitTracker Pro — Reporte de ' + p.name],
        ['Generado el', new Date().toLocaleDateString('es-ES', {day:'numeric',month:'long',year:'numeric'})],
        [],
        ['RESUMEN GENERAL'],
        ['Sesiones totales', sesses.length],
        ['Período', fmtDate(firstDate) + ' – ' + fmtDate(lastDate)],
        ['Volumen total acumulado (kg)', totalVol],
        ['Records personales', Object.keys(prs).length],
        ['Último peso registrado', bwLast ? bwLast + ' kg' : '—'],
        ['Cambio de peso total', bwFirst && bwLast ? (Math.round((bwLast-bwFirst)*10)/10) + ' kg' : '—'],
    ];
    if (p.height) summaryRows.push(['Altura', p.height + ' cm']);
    if (p.gender) summaryRows.push(['Sexo', p.gender === 'male' ? 'Hombre' : 'Mujer']);
    const ws1 = XLSX.utils.aoa_to_sheet(summaryRows);
    ws1['!cols'] = [{ wch: 32 }, { wch: 28 }];
    XLSX.utils.book_append_sheet(wb, ws1, 'Resumen');

    // ── Hoja 2: Sesiones detalladas ──────────────────────────────
    const sessRows = [['Fecha', 'Ejercicio', 'Grupo muscular', 'Serie', 'Peso (kg)', 'Reps', '1RM Est. (kg)', 'Volumen serie (kg)', 'Notas sesión']];
    sorted.forEach(s => {
        s.exercises.forEach(ex => {
            ex.sets.forEach((set, si) => {
                const orm = set.weight && set.reps ? calc1RM(set.weight, set.reps) : '';
                const vol = (set.weight || 0) * (set.reps || 0);
                sessRows.push([
                    s.date, ex.name, getMG(ex.mg).name,
                    si + 1, set.weight || '', set.reps || '',
                    orm || '', vol || '',
                    si === 0 ? (s.notes || '') : ''
                ]);
            });
        });
    });
    const ws2 = XLSX.utils.aoa_to_sheet(sessRows);
    ws2['!cols'] = [{ wch: 12 }, { wch: 26 }, { wch: 14 }, { wch: 6 }, { wch: 10 }, { wch: 6 }, { wch: 14 }, { wch: 18 }, { wch: 30 }];
    XLSX.utils.book_append_sheet(wb, ws2, 'Sesiones');

    // ── Hoja 3: Records Personales ───────────────────────────────
    const prRows = [['Ejercicio', 'Grupo muscular', 'Peso (kg)', 'Reps', '1RM Est. (kg)', 'Fecha']];
    Object.values(prs).sort((a,b) => b.orm - a.orm).forEach(pr => {
        prRows.push([pr.name, getMG(exercises.value.find(e=>e.id===Object.keys(prs).find(k=>prs[k]===pr))?.muscleGroup||'')?.name||'', pr.weight, pr.reps, pr.orm, pr.date]);
    });
    const ws3 = XLSX.utils.aoa_to_sheet(prRows);
    ws3['!cols'] = [{ wch: 26 }, { wch: 14 }, { wch: 10 }, { wch: 6 }, { wch: 14 }, { wch: 12 }];
    XLSX.utils.book_append_sheet(wb, ws3, 'Records (PRs)');

    // ── Hoja 4: Peso corporal ─────────────────────────────────────
    if (bw.length) {
        const bwRows = [['Fecha', 'Peso (kg)', '% Grasa corporal', 'Masa magra (kg)']];
        bw.forEach(b => {
            const lbm = b.weight && b.bodyFat ? Math.round(b.weight * (1 - b.bodyFat/100) * 10) / 10 : '';
            bwRows.push([b.date, b.weight, b.bodyFat ?? '', lbm]);
        });
        const ws4 = XLSX.utils.aoa_to_sheet(bwRows);
        ws4['!cols'] = [{ wch: 12 }, { wch: 12 }, { wch: 18 }, { wch: 16 }];
        XLSX.utils.book_append_sheet(wb, ws4, 'Peso corporal');
    }

    XLSX.writeFile(wb, 'reporte-' + p.name.replace(/\s+/g,'-').toLowerCase().replace(/[^a-z0-9-]/g,'') + '-' + today() + '.xlsx');
}

            charts.bw = new Chart(canvas, {
                type:'line',
                data: { labels:data.map(d=>fmtDate(d.date)), datasets:[{ label:'Peso', data:data.map(d=>d.weight), borderColor:col, backgroundColor:col+'25', fill:true, tension:0.4, pointBackgroundColor:col, pointRadius:5 }] },
                options: chartBase()
            });
        }
    }

    // Frequency chart (always shown in progress)
    const canvasF = document.getElementById('chartFreq');
    if (canvasF) {
        charts.freq = destroyChart(charts.freq);
        const weeks = [];
        const now = new Date();
        for (let i = 7; i >= 0; i--) {
            const ws = new Date(now); ws.setDate(now.getDate() - i*7);
            const we = new Date(ws); we.setDate(ws.getDate()+6);
            const a = ws.toISOString().slice(0,10), b = we.toISOString().slice(0,10);
            weeks.push({ label: i===0?'Esta':'Sem -'+i, count: mySessions.value.filter(s=>s.date>=a&&s.date<=b).length });
        }
        charts.freq = new Chart(canvasF, {
            type:'bar',
            data: { labels:weeks.map(w=>w.label), datasets:[{ data:weeks.map(w=>w.count), backgroundColor:col+'90', borderColor:col, borderWidth:1, borderRadius:5 }] },
            options: { ...chartBase(), scales:{ ...chartBase().scales, y:{ ...chartBase().scales.y, ticks:{ ...chartBase().scales.y.ticks, stepSize:1 } } } }
        });
    }
}

function getExData(exId) {
    const rows = [];
    mySessions.value.slice().reverse().forEach(s => {
        const ex = s.exercises.find(e => e.exId === exId);
        if (!ex) return;
        const best = ex.sets.reduce((b,s) => { if(!s.weight||!s.reps) return b; const o=calc1RM(s.weight,s.reps); return (!b||o>b.orm)?{...s,orm:o}:b; }, null);
        if (best) rows.push({ date:s.date, weight:best.weight, reps:best.reps, orm:best.orm, vol:calcVolume(ex.sets) });
    });
    return rows;
}

// Profile setting
function setDefaultSets(n) {
    const p = profiles.value.find(p => p.id === profileId.value);
    if (p) { p.defaultSets = Math.max(1, Math.min(10, n)); save(); }
}

// ── Watchers ──

watch(view, async v => { if (v === 'progress') { await nextTick(); setTimeout(initCharts, 100); } });
watch(progTab, async () => { await nextTick(); setTimeout(initCharts, 80); });
watch(progExId, async () => { await nextTick(); setTimeout(initCharts, 80); });
watch(loggedExercises, (list) => { if (!progExId.value && list.length) progExId.value = list[0].id; }, { immediate: true });

// ── Template ──
return {
    profiles, sessions, bodyWeights, exercises,
    profileId, profile, view, session,
    timer, timerDisplay, timerProgress, timerOver,
    modal, search, mgFilter, newProfileName, newProfileColor, newExForm, newBW,
    viewedSession, progTab, progExId,

    getExData, currentFFMI, calcFFMI, ffmiRange, ffmiGaugePct,
    newProfileHeight, newProfileGender, newBF,
    copiedDay, copyDay, pasteDay,
};
